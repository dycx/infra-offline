# 示例：将 application.properties 转为 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: middleware
data:
  application.properties: |
    # ── 数据库（ConfigMap 中引用 K8s Service 名）──
    spring.datasource.url=jdbc:mysql://mysql:*** # ConfigMap 挂载为文件 — 每个 key 是一个独立文件
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config-tree
  namespace: middleware
data:
  redis.host: "redis"
  redis.port: "6379"
  mysql.host: "mysql"
  mysql.port: "3306"
  spring.datasource.url: "jdbc:mysql://mysql:*** # Deployment 示例 — 两种注入方式
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: middleware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: app
        image: user-service:latest
        env:
        # ── 方式一：configtree 文件树（推荐，零代码改动）──
        - name: SPRING_CONFIG_IMPORT
          value: "configtree:/etc/config/"
        # ── 方式二：传统的 application.properties 挂载 ──
        - name: SPRING_CONFIG_LOCATION
          value: "file:/etc/app/application.properties"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config-tree
          mountPath: /etc/config       # configtree 路径
          readOnly: true
        - name: config-file
          mountPath: /etc/app          # application.properties 路径
          readOnly: true
      volumes:
      - name: config-tree
        configMap:
          name: user-service-config-tree
      - name: config-file
        configMap:
          name: user-service-config
